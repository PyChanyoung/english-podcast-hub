<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>English Podcast Hub</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3248;
      --accent: #6c63ff;
      --accent-hover: #857dff;
      --text: #e8eaf6;
      --text-muted: #8b90b0;
      --beginner: #34d399;
      --intermediate: #60a5fa;
      --advanced: #f472b6;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }

    /* Header */
    header {
      padding: 2.5rem 2rem 1.5rem;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }
    header h1 { font-size: 2rem; font-weight: 700; letter-spacing: -0.5px; }
    header h1 span { color: var(--accent); }
    header p { margin-top: 0.5rem; color: var(--text-muted); font-size: 0.95rem; }

    /* Filter tabs */
    .filters {
      display: flex;
      justify-content: center;
      gap: 0.75rem;
      padding: 1.75rem 2rem;
      flex-wrap: wrap;
    }
    .filter-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 0.5rem 1.25rem;
      border-radius: 999px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--text); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .filter-btn.beginner.active  { background: var(--beginner);  border-color: var(--beginner); }
    .filter-btn.intermediate.active { background: var(--intermediate); border-color: var(--intermediate); }
    .filter-btn.advanced.active  { background: var(--advanced);  border-color: var(--advanced); }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.25rem;
      padding: 0 2rem 4rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      transition: border-color 0.2s, transform 0.2s;
    }
    .card:hover { border-color: var(--accent); transform: translateY(-3px); }
    .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; }
    .card-emoji { font-size: 2rem; }
    .level-badge {
      font-size: 0.75rem; font-weight: 600;
      padding: 0.25rem 0.7rem; border-radius: 999px; white-space: nowrap;
    }
    .level-badge.beginner     { background: #0d3d2a; color: var(--beginner); }
    .level-badge.intermediate { background: #0d2240; color: var(--intermediate); }
    .level-badge.advanced     { background: #3d0d28; color: var(--advanced); }
    .card h2 { font-size: 1.05rem; font-weight: 600; }
    .card p   { font-size: 0.88rem; color: var(--text-muted); line-height: 1.6; flex: 1; }

    .card-links { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.25rem; }
    .link-btn {
      display: inline-flex; align-items: center; gap: 0.35rem;
      font-size: 0.82rem; padding: 0.35rem 0.85rem; border-radius: 8px;
      text-decoration: none; background: var(--surface2);
      color: var(--text-muted); border: 1px solid var(--border); transition: all 0.2s;
    }
    .link-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* Episode toggle button */
    .episode-btn {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 0.45rem 0.85rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.82rem;
      text-align: left;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .episode-btn:hover { border-color: var(--accent); color: var(--text); }
    .episode-btn.open  { border-color: var(--accent); color: var(--text); }
    .episode-btn .arrow { transition: transform 0.2s; }
    .episode-btn.open .arrow { transform: rotate(180deg); }

    /* Episode dropdown */
    .episode-list {
      display: none;
      flex-direction: column;
      gap: 0.4rem;
      max-height: 260px;
      overflow-y: auto;
      padding: 0.25rem 0;
    }
    .episode-list.open { display: flex; }
    .episode-list::-webkit-scrollbar { width: 4px; }
    .episode-list::-webkit-scrollbar-track { background: transparent; }
    .episode-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .episode-item {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      padding: 0.45rem 0.5rem;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
      border: none;
      background: none;
      color: var(--text);
      text-align: left;
      width: 100%;
    }
    .episode-item:hover { background: var(--surface2); }
    .episode-item img {
      width: 72px; height: 42px;
      object-fit: cover; border-radius: 5px; flex-shrink: 0;
    }
    .episode-item-title {
      font-size: 0.8rem; color: var(--text-muted);
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .episode-loading {
      font-size: 0.82rem; color: var(--text-muted);
      padding: 0.5rem; text-align: center;
    }
    .episode-error {
      font-size: 0.8rem; color: #f87171;
      padding: 0.5rem; text-align: center;
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 100%; max-width: 780px;
      overflow: hidden;
    }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
    }
    .modal-title { font-size: 0.9rem; font-weight: 600; }
    .modal-close {
      background: none; border: none; color: var(--text-muted);
      font-size: 1.3rem; cursor: pointer; line-height: 1;
      transition: color 0.2s;
    }
    .modal-close:hover { color: var(--text); }
    .modal-body { position: relative; padding-bottom: 56.25%; height: 0; }
    .modal-body iframe {
      position: absolute; inset: 0;
      width: 100%; height: 100%; border: none;
    }

    footer {
      text-align: center; padding: 2rem;
      color: var(--text-muted); font-size: 0.82rem;
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>

<header>
  <h1>English <span>Podcast</span> Hub</h1>
  <p>영어 실력 향상을 위한 팟캐스트 모음</p>
</header>

<div class="filters">
  <button class="filter-btn active" data-filter="all">전체</button>
  <button class="filter-btn beginner" data-filter="beginner">초급</button>
  <button class="filter-btn intermediate" data-filter="intermediate">중급</button>
  <button class="filter-btn advanced" data-filter="advanced">고급</button>
</div>

<div class="grid" id="grid"></div>

<!-- Video modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title"></span>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-body">
      <iframe id="modal-iframe" allowfullscreen
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture">
      </iframe>
    </div>
  </div>
</div>

<footer>
  좋은 팟캐스트를 발견하면 직접 추가해보세요 &mdash; <code>podcasts</code> 배열에 항목을 추가하면 됩니다.
</footer>

<script>
  const API_KEY = 'AIzaSyBuC0b-Fl3jmq4yRCnUNxrUUC4-iKlsBNw';

  const podcasts = [
    // ── 초급 ──────────────────────────────────────────────
    {
      level: "beginner",
      emoji: "🇬🇧",
      title: "LearnEnglish Podcast",
      desc: "British Council에서 만든 A1~B1 수준의 팟캐스트. 일상 대화 중심이며 스크립트와 연습 문제를 제공합니다.",
      channelId: "UC-qWJlvaPME3MWvrY-yjXeA",
      links: [{ label: "YouTube", url: "https://www.youtube.com/@BritishCouncilLearnEnglish" }]
    },
    {
      level: "beginner",
      emoji: "📰",
      title: "VOA Learning English",
      desc: "미국의 소리(VOA) 방송에서 제공하는 팟캐스트. 느리고 명확한 발음으로 세계 뉴스를 전달합니다.",
      channelId: "UCKyTokYo0nK2OA-az-sDijA",
      links: [{ label: "YouTube", url: "https://www.youtube.com/@VOALearningEnglish" }]
    },
    {
      level: "beginner",
      emoji: "👩‍🏫",
      title: "Speak English with Tiffani",
      desc: "문법·어휘·실생활 회화를 단계별로 친절하게 설명해줍니다. 초보자에게 자신감을 심어주는 스타일입니다.",
      channelId: "UCKSuUHboNHmqhMIet51QQug",
      links: [{ label: "YouTube", url: "https://www.youtube.com/@SpeakEnglishWithTiffani" }]
    },
    {
      level: "beginner",
      emoji: "📖",
      title: "Easy Stories in English",
      desc: "간단한 단어로 쓴 짧은 이야기를 들려주는 팟캐스트. 듣기 훈련에 최적화되어 있습니다.",
      channelId: null,
      links: [
        { label: "공식 사이트", url: "https://easystoriesinenglish.com/" },
        { label: "Spotify", url: "https://open.spotify.com/show/3YCPresWCHGPrGZBvMrAzp" }
      ]
    },

    // ── 중급 ──────────────────────────────────────────────
    {
      level: "intermediate",
      emoji: "⏱️",
      title: "BBC 6 Minute English",
      desc: "BBC에서 제공하는 6분짜리 짧은 에피소드. 다양한 주제의 어휘와 토론이 포함되어 있습니다.",
      channelId: "UCHaHD477h-FeBbVh9Sh7syA",
      links: [{ label: "YouTube", url: "https://www.youtube.com/@bbclearningenglish" }]
    },
    {
      level: "intermediate",
      emoji: "🌍",
      title: "Thinking in English",
      desc: "정치, 경제, 철학, 과학 등 흥미로운 주제를 영어로 깊이 있게 탐구합니다. 중~고급 전환에 적합.",
      channelId: "UCnWxuf5Rt9OcSt4AiviCe1A",
      links: [{ label: "YouTube", url: "https://www.youtube.com/@thinkinginenglishpodcast" }]
    },
    {
      level: "intermediate",
      emoji: "🎙️",
      title: "All Ears English",
      desc: "미국인 호스트 두 명이 일상 영어, 관용구, 문화를 자연스럽게 대화하는 형식으로 알려줍니다.",
      channelId: null,
      links: [
        { label: "공식 사이트", url: "https://www.allearsenglish.com/" },
        { label: "Spotify", url: "https://open.spotify.com/show/2O1eT4mGmFWxeqMW9MwIBd" }
      ]
    },

    // ── 고급 ──────────────────────────────────────────────
    {
      level: "advanced",
      emoji: "🎭",
      title: "Luke's English Podcast",
      desc: "영국인 영어 선생님 Luke가 진행하는 장편 팟캐스트. 영국식 유머와 심층 토픽으로 고급 표현을 익힐 수 있습니다.",
      channelId: "UC2L7vR43LKuBXXV2AentEMw",
      links: [{ label: "YouTube", url: "https://www.youtube.com/@LukesEnglishPodcast" }]
    },
    {
      level: "advanced",
      emoji: "🗞️",
      title: "The Daily (NYT)",
      desc: "뉴욕타임스의 대표 뉴스 팟캐스트. 실제 미국인이 쓰는 저널리즘 영어를 매일 20~30분으로 접할 수 있습니다.",
      channelId: null,
      links: [
        { label: "Spotify", url: "https://open.spotify.com/show/3IM0lmZxpFAY7CwMuv9H4g" },
        { label: "Apple Podcasts", url: "https://podcasts.apple.com/us/podcast/the-daily/id1200361736" }
      ]
    },
    {
      level: "advanced",
      emoji: "🧠",
      title: "Hardcore History",
      desc: "역사학자 Dan Carlin의 심층 역사 팟캐스트. 에피소드 하나가 수 시간에 달하는 고밀도 영어 청취 훈련입니다.",
      channelId: null,
      links: [
        { label: "공식 사이트", url: "https://www.dancarlin.com/hardcore-history-series/" },
        { label: "Spotify", url: "https://open.spotify.com/show/72qiPaoDRf8HkGKEChvG5q" }
      ]
    }
  ];

  // ── 에피소드 캐시 (채널ID → 영상 목록) ──────────────────────
  const episodeCache = {};

  async function fetchEpisodes(channelId) {
    if (episodeCache[channelId]) return episodeCache[channelId];
    const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${channelId}&type=video&maxResults=8&order=date&key=${API_KEY}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('API 오류');
    const data = await res.json();
    const items = (data.items || []).map(item => ({
      videoId: item.id.videoId,
      title: item.snippet.title,
      thumbnail: item.snippet.thumbnails.default.url
    }));
    episodeCache[channelId] = items;
    return items;
  }

  // ── 모달 ──────────────────────────────────────────────────
  const modal        = document.getElementById('modal');
  const modalTitle   = document.getElementById('modal-title');
  const modalIframe  = document.getElementById('modal-iframe');
  const modalClose   = document.getElementById('modal-close');

  function openModal(videoId, title) {
    modalTitle.textContent = title;
    modalIframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
    modal.classList.add('open');
  }
  function closeModal() {
    modal.classList.remove('open');
    modalIframe.src = '';
  }
  modalClose.addEventListener('click', closeModal);
  modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  // ── 카드 렌더 ─────────────────────────────────────────────
  const grid = document.getElementById('grid');

  function renderCards(filter) {
    grid.innerHTML = '';
    podcasts
      .filter(p => filter === 'all' || p.level === filter)
      .forEach(p => {
        const levelLabel = { beginner: '초급', intermediate: '중급', advanced: '고급' }[p.level];
        const card = document.createElement('div');
        card.className = 'card';

        const episodeSection = p.channelId ? `
          <button class="episode-btn" data-channel="${p.channelId}">
            <span>▶ 최신 에피소드 보기</span>
            <span class="arrow">▾</span>
          </button>
          <div class="episode-list" data-list="${p.channelId}"></div>
        ` : '';

        card.innerHTML = `
          <div class="card-top">
            <span class="card-emoji">${p.emoji}</span>
            <span class="level-badge ${p.level}">${levelLabel}</span>
          </div>
          <h2>${p.title}</h2>
          <p>${p.desc}</p>
          <div class="card-links">
            ${p.links.map(l => `<a class="link-btn" href="${l.url}" target="_blank" rel="noopener">↗ ${l.label}</a>`).join('')}
          </div>
          ${episodeSection}
        `;

        // 에피소드 버튼 이벤트
        if (p.channelId) {
          const btn  = card.querySelector('.episode-btn');
          const list = card.querySelector('.episode-list');
          let loaded = false;

          btn.addEventListener('click', async () => {
            const isOpen = list.classList.contains('open');
            if (isOpen) {
              list.classList.remove('open');
              btn.classList.remove('open');
              return;
            }
            list.classList.add('open');
            btn.classList.add('open');

            if (loaded) return;
            list.innerHTML = '<div class="episode-loading">불러오는 중...</div>';
            try {
              const episodes = await fetchEpisodes(p.channelId);
              loaded = true;
              if (episodes.length === 0) {
                list.innerHTML = '<div class="episode-error">에피소드를 찾을 수 없습니다.</div>';
                return;
              }
              list.innerHTML = episodes.map(ep => `
                <button class="episode-item" data-video="${ep.videoId}" data-title="${ep.title.replace(/"/g,'&quot;')}">
                  <img src="${ep.thumbnail}" alt="" loading="lazy">
                  <span class="episode-item-title">${ep.title}</span>
                </button>
              `).join('');
              list.querySelectorAll('.episode-item').forEach(item => {
                item.addEventListener('click', () => openModal(item.dataset.video, item.dataset.title));
              });
            } catch {
              list.innerHTML = '<div class="episode-error">불러오기 실패. API 키나 도메인 설정을 확인해주세요.</div>';
            }
          });
        }

        grid.appendChild(card);
      });
  }

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderCards(btn.dataset.filter);
    });
  });

  renderCards('all');
</script>

</body>
</html>
